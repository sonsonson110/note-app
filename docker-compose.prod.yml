version: '3.8'

services:
  backend-prod:
    build:
      context: ./be
      dockerfile: Dockerfile.prod
    container_name: note-app-backend-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./be/.env.production
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/note-app?schema=public
      - NODE_ENV=production
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend-prod:
    build:
      context: ./fe
      dockerfile: Dockerfile.prod
    container_name: note-app-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./fe/.env.production
    depends_on:
      - backend-prod
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  db:
    image: postgres:17.4-alpine3.21
    container_name: note-app-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=note-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # Only expose port locally for debugging; comment out for production
    # ports:
    #   - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
    driver: local