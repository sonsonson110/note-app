version: '3.8'

services:
  backend-prod:
    build:
      context: ./be
      dockerfile: Dockerfile.prod
    container_name: note-app-backend-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./be/.env.production
    environment:
      - DATABASE_URL=postgres://postgres:password@host.docker.internal:5432/note-app?schema=public
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend-prod:
    build:
      context: ./fe
      dockerfile: Dockerfile.prod
    container_name: note-app-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - ./fe/.env.production
    depends_on:
      - backend-prod
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M